name: Frontend E2E

on:
  push:
    paths:
      - 'kyrk-projekt/frontend/**'
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kyrk-projekt/frontend/member-portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E tests (Mobile + Desktop)
        run: npx playwright test tests/e2e.spec.js
        env:
          BASE_URL: https://kyrka-portal.pages.dev

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: kyrk-projekt/frontend/member-portal/test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: kyrk-projekt/frontend/member-portal/playwright-report/
          retention-days: 7
