name: E2E Visual Tests

on:
  push:
    paths:
      - 'kyrk-projekt/frontend/**'
  pull_request:
    paths:
      - 'kyrk-projekt/frontend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kyrk-projekt/frontend/member-portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright @playwright/test

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Mobile + Desktop)
        run: npx playwright test
        env:
          BASE_URL: https://kyrka-portal.pages.dev

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: kyrk-projekt/frontend/member-portal/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: kyrk-projekt/frontend/member-portal/test-results/
          retention-days: 7
