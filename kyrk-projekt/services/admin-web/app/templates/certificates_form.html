{% extends "base.html" %}
{% block title %}Utfärda certifikat — kyrk-projekt admin{% endblock %}
{% block content %}
<section class="card">
  <h1>Utfärda certifikat</h1>
  <p class="muted small">
    Endast <code>admin</code> och <code>pastor</code> kan utfärda. Action loggas i audit-trail.
  </p>

  <form method="post" action="/certificates/new" class="stacked">
    <label>
      Typ
      <select name="certificate_type" required>
        <optgroup label="Kyrkliga handlingar">
          <option value="baptism">Dop / ጥምቀት / Baptism</option>
          <option value="confirmation">Konfirmation / ክርስትና / Confirmation</option>
          <option value="marriage">Vigsel / ጋብቻ / Marriage</option>
          <option value="funeral">Begravning / ቀብር / Funeral</option>
        </optgroup>
        <optgroup label="Söndagsskolan / የሰንበት ትምህርት ቤት">
          <option value="sunday_school_seed">🌱 Fröet (5-7) / ዘር / The Seed</option>
          <option value="sunday_school_plant">🌿 Plantan (7-9) / ተክል / The Plant</option>
          <option value="sunday_school_tree">🌳 Trädet (9-11) / ዛፍ / The Tree</option>
          <option value="sunday_school_disciple">📖 Lärjungen (11-13) / ደቀ መዝሙር / The Disciple</option>
          <option value="sunday_school_servant">🕯 Tjänaren (13-15) / አገልጋይ / The Servant</option>
          <option value="sunday_school_ambassador">👑 Ambassadören (15-18) / አምባሳደር / Ambassador</option>
        </optgroup>
      </select>
    </label>
    <label>
      Datum
      <input type="date" name="issued_date" value="{{ today }}" required />
    </label>
    <label>
      Medlems-id
      <input type="text" name="member_id" required placeholder="t.ex. f7a9…" />
    </label>
    <label>
      Kyrkans namn
      <input type="text" name="church_name" required placeholder="Sankt Johannes kyrka" />
    </label>
    <button type="submit" class="primary">Utfärda</button>
  </form>
</section>
{% endblock %}
